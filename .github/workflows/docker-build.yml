name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Initial disk usage:"
          df -h

          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache || true
          docker system prune -af || true

          echo "Disk usage after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Extract version if tag
        id: get_version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF##refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/kokorotts:latest .
          if [[ -n "$VERSION" ]]; then
            docker tag ${{ secrets.DOCKER_USERNAME }}/kokorotts:latest ${{ secrets.DOCKER_USERNAME }}/kokorotts:$VERSION
          fi

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/kokorotts:latest
          if [[ -n "$VERSION" ]]; then
            docker push ${{ secrets.DOCKER_USERNAME }}/kokorotts:$VERSION
          fi

