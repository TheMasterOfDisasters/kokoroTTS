version: '3'

vars:
  IMAGE: kokorotts:test
  TINY_IMAGE: kokorotts:tiny
  PORT: '7860'
  GPU_DEVICE: '0'
  APP_DEVICE: 'auto'
  HF_TOKEN: ''
  HF_CACHE_VOLUME: kokorotts_hf_cache
  HF_HUB_OFFLINE: '1'
  TRANSFORMERS_OFFLINE: '1'
  CONTAINER: kokorotts
  CONTAINER_LOCAL: kokorotts_local
  TEMP_WAV: '%TEMP%\\kokorotts_task.wav'
  TEMP_AUDIO: '%TEMP%\\kokorotts_task_audio'
  API_TEXT: 'Hello world. This is Kokoro TTS.'
  API_VOICE: 'af_heart'
  API_FORMAT: 'mp3'
  DRY_RUN: '0'
  NEXT_VERSION: ''
  SKIP_VALIDATION: '0'

tasks:
  gpuinfo:
    desc: Show host GPU indexes (use with GPU_DEVICE variable)
    cmds:
      - cmd /c nvidia-smi --query-gpu=index,name --format=csv,noheader

  image:
    desc: Build local baked KokoroTTS Docker image
    cmds:
      - cmd /c docker build --target baked -t {{.IMAGE}} .

  image-tiny:
    desc: Build local tiny KokoroTTS Docker image without baked model/voice cache
    cmds:
      - cmd /c docker build --target tiny -t {{.TINY_IMAGE}} .

  cache-init:
    desc: Seed the persistent Hugging Face cache volume from the baked image
    cmds:
      - cmd /c docker volume create {{.HF_CACHE_VOLUME}} >nul
      - cmd /c docker run --rm -v {{.HF_CACHE_VOLUME}}:/cache {{.IMAGE}} sh -c "mkdir -p /cache && cp -an /app/.cache/huggingface/. /cache/ || true"

  release:
    desc: Release current VERSION snapshot, tag it, and prepare next snapshot
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/release.ps1 -DryRun "{{.DRY_RUN}}" -NextVersion "{{.NEXT_VERSION}}" -SkipValidation "{{.SKIP_VALIDATION}}"

  deps:
    desc: Regenerate Linux/Python 3.11 pinned requirements.txt from requirements.in
    cmds:
      - uv pip compile requirements.in --python-version 3.11 --python-platform x86_64-manylinux_2_36 --no-header --no-annotate --output-file requirements.txt

  imagerun:
    desc: Run baked image with UI and API on PORT (default GPU_DEVICE=0)
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - task: cache-init
      - cmd /c docker run -d --name {{.CONTAINER}} -p {{.PORT}}:7860 --gpus all -e CUDA_VISIBLE_DEVICES={{.GPU_DEVICE}} -e KOKOROTTS_DEVICE={{.APP_DEVICE}} -e PORT=7860 -e HF_TOKEN={{.HF_TOKEN}} -e HF_HUB_OFFLINE={{.HF_HUB_OFFLINE}} -e TRANSFORMERS_OFFLINE={{.TRANSFORMERS_OFFLINE}} -v {{.HF_CACHE_VOLUME}}:/app/.cache/huggingface {{.IMAGE}}
      - cmd /c docker ps --filter "name={{.CONTAINER}}"

  imagerun-tiny:
    desc: Run tiny image online on first use, using the persistent Hugging Face cache volume
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - cmd /c docker volume create {{.HF_CACHE_VOLUME}} >nul
      - cmd /c docker run -d --name {{.CONTAINER}} -p {{.PORT}}:7860 --gpus all -e CUDA_VISIBLE_DEVICES={{.GPU_DEVICE}} -e KOKOROTTS_DEVICE={{.APP_DEVICE}} -e PORT=7860 -e HF_TOKEN={{.HF_TOKEN}} -e HF_HUB_OFFLINE=0 -e TRANSFORMERS_OFFLINE=0 -v {{.HF_CACHE_VOLUME}}:/app/.cache/huggingface {{.TINY_IMAGE}}
      - cmd /c docker ps --filter "name={{.CONTAINER}}"

  localrun:
    desc: Run baked image with local kokorotts/ bind-mounted for hot-swapping
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - task: cache-init
      - cmd /c docker run -d --name {{.CONTAINER_LOCAL}} -p {{.PORT}}:7860 --gpus all -e CUDA_VISIBLE_DEVICES={{.GPU_DEVICE}} -e KOKOROTTS_DEVICE={{.APP_DEVICE}} -e PORT=7860 -e UVICORN_RELOAD=1 -e HF_TOKEN={{.HF_TOKEN}} -e HF_HUB_OFFLINE={{.HF_HUB_OFFLINE}} -e TRANSFORMERS_OFFLINE={{.TRANSFORMERS_OFFLINE}} -v {{.HF_CACHE_VOLUME}}:/app/.cache/huggingface -v "{{.TASKFILE_DIR}}\kokorotts:/app/kokorotts" {{.IMAGE}}
      - cmd /c docker ps --filter "name={{.CONTAINER_LOCAL}}"

  localrun-tiny:
    desc: Run tiny image with local kokorotts/ bind-mounted, online on first use
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - cmd /c docker volume create {{.HF_CACHE_VOLUME}} >nul
      - cmd /c docker run -d --name {{.CONTAINER_LOCAL}} -p {{.PORT}}:7860 --gpus all -e CUDA_VISIBLE_DEVICES={{.GPU_DEVICE}} -e KOKOROTTS_DEVICE={{.APP_DEVICE}} -e PORT=7860 -e UVICORN_RELOAD=1 -e HF_TOKEN={{.HF_TOKEN}} -e HF_HUB_OFFLINE=0 -e TRANSFORMERS_OFFLINE=0 -v {{.HF_CACHE_VOLUME}}:/app/.cache/huggingface -v "{{.TASKFILE_DIR}}\kokorotts:/app/kokorotts" {{.TINY_IMAGE}}
      - cmd /c docker ps --filter "name={{.CONTAINER_LOCAL}}"

  imageweb:
    desc: Open default browser to local KokoroTTS UI
    cmds:
      - cmd /c start "" "http://localhost:{{.PORT}}"

  imageapi:
    desc: Call API, play generated temp audio, then remove it
    cmds:
      - 'cmd /c curl.exe -sS --retry 30 --retry-delay 2 --retry-connrefused http://localhost:{{.PORT}}/tts/ping >nul'
      - 'cmd /c curl.exe -sS -X POST http://localhost:{{.PORT}}/tts/generate -H "Content-Type: application/json" -d "{\"text\":\"{{.API_TEXT}}\",\"speed\":1.0,\"voice\":\"{{.API_VOICE}}\",\"device\":\"{{.APP_DEVICE}}\",\"output_format\":\"{{.API_FORMAT}}\"}" --output {{.TEMP_AUDIO}}.{{.API_FORMAT}}'
      - 'cmd /c if not exist {{.TEMP_AUDIO}}.{{.API_FORMAT}} exit /b 1'
      - 'cmd /c python -c "from pathlib import Path; p=Path(r''{{.TEMP_AUDIO}}.{{.API_FORMAT}}''); assert p.exists() and p.stat().st_size > 0, p"'
      - 'powershell -NoProfile -ExecutionPolicy Bypass -File scripts/play-audio.ps1 -Path "{{.TEMP_AUDIO}}.{{.API_FORMAT}}"'
      - 'cmd /c del /f /q {{.TEMP_AUDIO}}.{{.API_FORMAT}}'

  imageapi-voice:
    desc: Call API for API_VOICE/API_TEXT, play generated temp WAV, then remove it
    cmds:
      - 'cmd /c curl.exe -sS --retry 30 --retry-delay 2 --retry-connrefused http://localhost:{{.PORT}}/tts/ping >nul'
      - 'cmd /c curl.exe -sS -X POST http://localhost:{{.PORT}}/tts/generate -H "Content-Type: application/json" -d "{\"text\":\"{{.API_TEXT}}\",\"speed\":1.0,\"voice\":\"{{.API_VOICE}}\",\"device\":\"{{.APP_DEVICE}}\"}" --output {{.TEMP_WAV}}'
      - 'cmd /c if not exist {{.TEMP_WAV}} exit /b 1'
      - 'cmd /c python -c "import winsound; winsound.PlaySound(r''{{.TEMP_WAV}}'', winsound.SND_FILENAME)"'
      - 'cmd /c del /f /q {{.TEMP_WAV}}'

  imageapi-format:
    desc: Call API for API_FORMAT and verify the output file is non-empty
    cmds:
      - 'cmd /c curl.exe -sS --retry 30 --retry-delay 2 --retry-connrefused http://localhost:{{.PORT}}/tts/ping >nul'
      - 'cmd /c curl.exe -sS -X POST http://localhost:{{.PORT}}/tts/generate -H "Content-Type: application/json" -d "{\"text\":\"{{.API_TEXT}}\",\"speed\":1.0,\"voice\":\"{{.API_VOICE}}\",\"device\":\"{{.APP_DEVICE}}\",\"output_format\":\"{{.API_FORMAT}}\"}" --output {{.TEMP_AUDIO}}.{{.API_FORMAT}}'
      - 'cmd /c if not exist {{.TEMP_AUDIO}}.{{.API_FORMAT}} exit /b 1'
      - 'cmd /c python -c "from pathlib import Path; p=Path(r''{{.TEMP_AUDIO}}.{{.API_FORMAT}}''); assert p.exists() and p.stat().st_size > 0, p"'
      - 'cmd /c del /f /q {{.TEMP_AUDIO}}.{{.API_FORMAT}}'

  client-test:
    desc: Run server-backed KokoroTTS Python client API tests
    cmds:
      - 'cmd /c curl.exe -sS --retry 30 --retry-delay 2 --retry-connrefused http://localhost:{{.PORT}}/tts/ping >nul'
      - 'cmd /c "set KOKOROTTS_TEST_BASE_URL=http://localhost:{{.PORT}}&& python tests/run_client_tests.py"'

  imagestop:
    desc: Stop running KokoroTTS containers
    cmds:
      - cmd: cmd /c docker stop {{.CONTAINER}} >nul 2>&1
        ignore_error: true
      - cmd: cmd /c docker stop {{.CONTAINER_LOCAL}} >nul 2>&1
        ignore_error: true

  logs:
    desc: Show logs from active KokoroTTS container
    cmds:
      - cmd /c docker logs --tail 200 {{.CONTAINER_LOCAL}} 2>nul || docker logs --tail 200 {{.CONTAINER}}

  nuke:
    desc: Remove KokoroTTS local containers, image, and Hugging Face cache volume
    cmds:
      - cmd /c docker rm -f {{.CONTAINER}} >nul 2>&1
      - cmd /c docker rm -f {{.CONTAINER_LOCAL}} >nul 2>&1
      - cmd /c docker rmi -f {{.IMAGE}} >nul 2>&1
      - cmd /c docker rmi -f {{.TINY_IMAGE}} >nul 2>&1
      - cmd /c docker volume rm -f {{.HF_CACHE_VOLUME}} >nul 2>&1

